# Automated releases: opens a release PR (version bump + changelog) on push to
# main, and publishes to crates.io when that PR merges. RELEASE_PLZ_TOKEN is a
# GitHub PAT (contents + PR write) so release-plz PRs trigger CI;
# CARGO_REGISTRY_TOKEN is the crates.io token. Third-party actions are SHA-pinned
# and checkout credentials are not persisted (supply-chain hardening).
name: release-plz

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
