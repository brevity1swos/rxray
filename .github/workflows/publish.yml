name: publish

# One-shot manual publish to crates.io. release-plz cannot bootstrap a crate
# that has no registry version yet, so the first publish is manual; subsequent
# releases can move to release-plz.
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test
        run: cargo test --all-targets
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
